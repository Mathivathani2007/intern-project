name: flutter_app
description: A starter Flutter app with Firebase Authentication, Firestore, and Realtime Database.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=2.19.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.19.0
  firebase_auth: ^4.7.0
  cloud_firestore: ^4.9.0
  firebase_database: ^10.0.0
  google_sign_in: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
